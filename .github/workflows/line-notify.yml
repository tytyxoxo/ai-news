name: Notify LINE

on:
  push:
    branches:
      - main
    paths:
      - "articles/**.md"
  workflow_dispatch:

jobs:
  send-line:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get article content
        id: article
        run: |
          FILE=$(git diff-tree --no-commit-id -r --name-only ${{ github.sha }} | grep 'articles/' | head -1)
          if [ -z "$FILE" ]; then echo "No article found, skipping."; exit 0; fi
          HEADLINES=$(grep '^## [0-9]' "$FILE" | head -5 | sed 's/## //')
          DATE=$(grep '^date:' "$FILE" | head -1 | sed 's/date: //')
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "headlines<<EOF" >> $GITHUB_OUTPUT
          echo "$HEADLINES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to LINE
        if: steps.article.outputs.file != ''
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          DATE: ${{ steps.article.outputs.date }}
          HEADLINES: ${{ steps.article.outputs.headlines }}
          REPO: ${{ github.repository }}
          FILE: ${{ steps.article.outputs.file }}
        run: |
          MESSAGE=$(printf "AI News %s\n\n%s\n\nอ่านเพิ่มเติม: https://github.com/%s/blob/main/%s" "$DATE" "$HEADLINES" "$REPO" "$FILE")
          RESPONSE=$(curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"to\": \"${LINE_TO}\", \"messages\": [{\"type\": \"text\", \"text\": $(echo "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}]}")
          echo "LINE API Response: $RESPONSE"
